name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: rust / fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --no-fail-fast

  docker-build:
    name: docker / build images
    runs-on: ubuntu-latest
    needs: rust
    strategy:
      matrix:
        component: [gateway, coordinator, mgmt, openai-api]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.component }}.Dockerfile
          push: false
          load: true
          tags: gpucluster/${{ matrix.component }}:ci

  worker-image:
    name: docker / worker image (cuda matrix)
    runs-on: ubuntu-latest
    needs: rust
    strategy:
      matrix:
        cuda: ["12.8.0", "12.4.0", "11.8.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build worker (CUDA ${{ matrix.cuda }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/worker.Dockerfile
          build-args: CUDA_VERSION=${{ matrix.cuda }}
          push: false
          load: true
          tags: gpucluster/worker:ci-cuda${{ matrix.cuda }}
