syntax = "proto3";

package gpucluster.node.v1;

message NodeInfo {
  string node_id          = 1;
  string hostname         = 2;
  string display_name     = 3;
  string hw_fingerprint   = 4;
  string owner_user_id    = 5;
  repeated string tags    = 6;

  OsInfo os               = 7;
  repeated GpuInfo gpus   = 8;
  NetworkInfo network     = 9;
  CpuMemInfo cpu_mem      = 10;
  GeoInfo geo             = 11;

  NodeStatus status       = 12;
  int64 first_seen        = 13;
  int64 last_heartbeat    = 14;
  string agent_version    = 15;
  string client_cert_sha  = 16;
}

enum NodeStatus {
  NODE_STATUS_UNSPECIFIED      = 0;
  NODE_STATUS_PENDING_APPROVAL = 1;
  NODE_STATUS_ONLINE           = 2;
  NODE_STATUS_DEGRADED         = 3;
  NODE_STATUS_DRAINING         = 4;
  NODE_STATUS_OFFLINE          = 5;
  NODE_STATUS_QUARANTINED      = 6;
  NODE_STATUS_REVOKED          = 7;
}

message OsInfo {
  string family    = 1;
  string version   = 2;
  string kernel    = 3;
  string arch      = 4;
}

// Backend a GPU is driven by — also determines which inference RPC server
// the worker has to start (CUDA → ggml-cuda, Metal → ggml-metal).
enum GpuBackend {
  GPU_BACKEND_UNSPECIFIED = 0;
  GPU_BACKEND_CUDA        = 1;  // NVIDIA + CUDA / NVML
  GPU_BACKEND_METAL       = 2;  // Apple Silicon (M-series), unified memory
  GPU_BACKEND_ROCM        = 3;  // AMD (future)
  GPU_BACKEND_VULKAN      = 4;  // generic fallback (future)
}

message GpuInfo {
  uint32 index             = 1;
  string uuid              = 2;
  string name              = 3;
  string architecture      = 4;
  uint32 compute_cap_major = 5;
  uint32 compute_cap_minor = 6;
  uint64 vram_total_bytes  = 7;
  uint64 vram_free_bytes   = 8;
  string pci_bus_id        = 9;
  string driver_version    = 10;
  string cuda_version      = 11;
  string vbios_version     = 12;
  uint32 power_limit_w     = 13;
  bool   nvlink_present    = 14;
  GpuCapabilityProfile capability = 15;

  // Cross-vendor extensions (Phase 1 — Apple Silicon support).
  GpuBackend backend       = 16;
  bool   unified_memory    = 17;  // Apple Silicon: CPU+GPU share RAM
  uint32 gpu_core_count    = 18;  // Apple GPU cores; 0 for NVIDIA (use SM count instead)
  string metal_family      = 19;  // e.g. "Metal3", "Metal4" — empty for non-Metal
}

message GpuCapabilityProfile {
  string architecture       = 1;
  uint32 compute_cap_major  = 2;
  uint32 compute_cap_minor  = 3;
  uint64 vram_bytes         = 4;
  float  mem_bandwidth_gbs  = 5;
  bool   supports_fp16      = 6;
  bool   supports_bf16      = 7;
  bool   supports_fp8       = 8;
  bool   supports_fp4       = 9;
  bool   supports_int8_tc   = 10;
  BenchScore benchmark      = 11;

  // Cross-vendor extensions.
  GpuBackend backend        = 12;
  bool   unified_memory     = 13;
}

message BenchScore {
  float  forward_pass_tps   = 1;  // tokens/s on reference model
  float  flops_fp16_tflops  = 2;
  float  flops_bf16_tflops  = 3;
  int64  measured_at        = 4;
}

message NetworkInfo {
  string public_ip_v4         = 1;
  string public_ip_v6         = 2;
  string asn                  = 3;
  string isp                  = 4;
  string country_code         = 5;
  string city                 = 6;
  bool   public_ip_is_dynamic = 7;
  int64  public_ip_changed_at = 8;

  repeated string local_ips   = 9;
  string primary_iface        = 10;
  uint32 link_speed_mbps      = 11;

  string wg_ip                = 12;
  string wg_pubkey_sha        = 13;
  uint32 wg_listen_port       = 14;

  uint32 rtt_to_gateway_ms    = 15;
}

message CpuMemInfo {
  string cpu_model         = 1;
  uint32 cpu_cores         = 2;
  uint32 cpu_threads       = 3;
  uint64 ram_total_bytes   = 4;
  uint64 ram_free_bytes    = 5;
}

message GeoInfo {
  string country_code = 1;
  string region       = 2;
  string city         = 3;
  double latitude     = 4;
  double longitude    = 5;
}
